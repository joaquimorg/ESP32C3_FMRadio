<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="720" viewBox="0 0 1040 720">
  <title>Esquema de ligacoes ESP32-C3 FM Radio</title>
  <rect width="1040" height="720" fill="#071019"/>
  <rect x="40" y="60" width="210" height="600" rx="8" fill="#101a24" stroke="#26394a"/>
<text x="145.0" y="82" font-family="Consolas,monospace" font-size="18" font-weight="700" text-anchor="middle" fill="#ffffff">ESP32-C3</text>
<text x="58" y="112" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">GPIO3  SDA</text>
<text x="58" y="136" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">GPIO4  SCL</text>
<text x="58" y="160" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">GPIO20 RST Si4703</text>
<text x="58" y="184" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">GPIO5  Botao 1</text>
<text x="58" y="208" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">GPIO6  Botao 2</text>
<text x="58" y="232" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">GPIO7  Botao 3</text>
<text x="58" y="256" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">GPIO8  Botao 4</text>
<text x="58" y="280" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">3V3</text>
<text x="58" y="304" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">GND</text>
<text x="58" y="328" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">USB nativo: Serial</text>
<rect x="410" y="55" width="250" height="165" rx="8" fill="#101a24" stroke="#26394a"/>
<text x="535.0" y="77" font-family="Consolas,monospace" font-size="18" font-weight="700" text-anchor="middle" fill="#ffffff">OLED SSD1306</text>
<text x="428" y="107" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">VCC -&gt; 3V3</text>
<text x="428" y="131" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">GND -&gt; GND</text>
<text x="428" y="155" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">SDA -&gt; GPIO3</text>
<text x="428" y="179" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">SCL -&gt; GPIO4</text>
<text x="428" y="203" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">Addr 0x3C</text>
<rect x="410" y="265" width="250" height="190" rx="8" fill="#101a24" stroke="#26394a"/>
<text x="535.0" y="287" font-family="Consolas,monospace" font-size="18" font-weight="700" text-anchor="middle" fill="#ffffff">Si4703</text>
<text x="428" y="317" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">VCC -&gt; 3V3</text>
<text x="428" y="341" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">GND -&gt; GND</text>
<text x="428" y="365" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">SDIO/SDA -&gt; GPIO3</text>
<text x="428" y="389" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">SCLK/SCL -&gt; GPIO4</text>
<text x="428" y="413" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">RST -&gt; GPIO20</text>
<text x="428" y="437" font-family="Consolas,monospace" font-size="15" font-weight="400" text-anchor="start" fill="#d7e7ef">Audio -&gt; jack/amplificador</text>
<path d="M250 120 C330 120 330 96 410 96" stroke="#28c76f" stroke-width="4" fill="none"/>
<text x="286" y="94" font-family="Consolas,monospace" font-size="13" font-weight="400" text-anchor="start" fill="#d7e7ef">SDA GPIO3</text>
<path d="M250 150 C330 150 330 126 410 126" stroke="#00c2ff" stroke-width="4" fill="none"/>
<text x="286" y="126" font-family="Consolas,monospace" font-size="13" font-weight="400" text-anchor="start" fill="#d7e7ef">SCL GPIO4</text>
<path d="M250 180 C330 180 330 156 410 156" stroke="#ffcf5a" stroke-width="4" fill="none"/>
<text x="286" y="158" font-family="Consolas,monospace" font-size="13" font-weight="400" text-anchor="start" fill="#d7e7ef">3V3</text>
<path d="M250 210 C330 210 330 186 410 186" stroke="#9aa7b0" stroke-width="4" fill="none"/>
<text x="286" y="190" font-family="Consolas,monospace" font-size="13" font-weight="400" text-anchor="start" fill="#d7e7ef">GND</text>
<path d="M250 260 C335 260 335 300 410 300" stroke="#28c76f" stroke-width="4" fill="none"/>
<text x="286" y="222" font-family="Consolas,monospace" font-size="13" font-weight="400" text-anchor="start" fill="#d7e7ef">SDA GPIO3</text>
<path d="M250 290 C335 290 335 330 410 330" stroke="#00c2ff" stroke-width="4" fill="none"/>
<text x="286" y="254" font-family="Consolas,monospace" font-size="13" font-weight="400" text-anchor="start" fill="#d7e7ef">SCL GPIO4</text>
<path d="M250 320 C335 320 335 360 410 360" stroke="#ff6b6b" stroke-width="4" fill="none"/>
<text x="286" y="286" font-family="Consolas,monospace" font-size="13" font-weight="400" text-anchor="start" fill="#d7e7ef">RST GPIO20</text>
<path d="M250 350 C335 350 335 390 410 390" stroke="#ffcf5a" stroke-width="4" fill="none"/>
<text x="286" y="318" font-family="Consolas,monospace" font-size="13" font-weight="400" text-anchor="start" fill="#d7e7ef">3V3</text>
<path d="M250 380 C335 380 335 420 410 420" stroke="#9aa7b0" stroke-width="4" fill="none"/>
<text x="286" y="350" font-family="Consolas,monospace" font-size="13" font-weight="400" text-anchor="start" fill="#d7e7ef">GND</text>
<path d="M250 500 H500" stroke="#c792ea" stroke-width="4" fill="none"/>
<text x="255" y="492" font-family="Consolas,monospace" font-size="14" font-weight="400" text-anchor="start" fill="#f4e7ff">BTN1: GPIO5 -&gt; botao -&gt; GND (INPUT_PULLUP)</text>
<circle cx="520" cy="500" r="11" fill="none" stroke="#c792ea" stroke-width="3"/>
<line x1="531" y1="500" x2="600" y2="500" stroke="#9aa7b0" stroke-width="4"/>
<path d="M250 546 H500" stroke="#c792ea" stroke-width="4" fill="none"/>
<text x="255" y="538" font-family="Consolas,monospace" font-size="14" font-weight="400" text-anchor="start" fill="#f4e7ff">BTN2: GPIO6 -&gt; botao -&gt; GND (INPUT_PULLUP)</text>
<circle cx="520" cy="546" r="11" fill="none" stroke="#c792ea" stroke-width="3"/>
<line x1="531" y1="546" x2="600" y2="546" stroke="#9aa7b0" stroke-width="4"/>
<path d="M250 592 H500" stroke="#c792ea" stroke-width="4" fill="none"/>
<text x="255" y="584" font-family="Consolas,monospace" font-size="14" font-weight="400" text-anchor="start" fill="#f4e7ff">BTN3: GPIO7 -&gt; botao -&gt; GND (INPUT_PULLUP)</text>
<circle cx="520" cy="592" r="11" fill="none" stroke="#c792ea" stroke-width="3"/>
<line x1="531" y1="592" x2="600" y2="592" stroke="#9aa7b0" stroke-width="4"/>
<path d="M250 638 H500" stroke="#c792ea" stroke-width="4" fill="none"/>
<text x="255" y="630" font-family="Consolas,monospace" font-size="14" font-weight="400" text-anchor="start" fill="#f4e7ff">BTN4: GPIO8 -&gt; botao -&gt; GND (INPUT_PULLUP)</text>
<circle cx="520" cy="638" r="11" fill="none" stroke="#c792ea" stroke-width="3"/>
<line x1="531" y1="638" x2="600" y2="638" stroke="#9aa7b0" stroke-width="4"/>
<text x="710" y="90" font-family="Consolas,monospace" font-size="18" font-weight="700" text-anchor="start" fill="#ffffff">Notas</text>
<text x="710" y="124" font-family="Consolas,monospace" font-size="14" font-weight="400" text-anchor="start" fill="#d7e7ef">I2C partilhado: OLED e Si4703 no mesmo SDA/SCL.</text>
<text x="710" y="154" font-family="Consolas,monospace" font-size="14" font-weight="400" text-anchor="start" fill="#d7e7ef">Botoes ligam ao GND; o firmware usa INPUT_PULLUP.</text>
<text x="710" y="184" font-family="Consolas,monospace" font-size="14" font-weight="400" text-anchor="start" fill="#d7e7ef">GPIO20 e UART0 RX: usar USB CDC no platformio.ini.</text>
<text x="710" y="214" font-family="Consolas,monospace" font-size="14" font-weight="400" text-anchor="start" fill="#d7e7ef">Confirmar pull-ups I2C se os modulos nao os incluirem.</text>
</svg>
